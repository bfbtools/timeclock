# Netlify configuration — Back Forty Builders Time Clock
# Static front end in /public, serverless API in /netlify/functions.

[build]
  publish = "public"
  functions = "netlify/functions"
  command = "npm run build"

[functions]
  # Bundle the shared lib + node deps with each function.
  node_bundler = "esbuild"

# Friendly path: /api/* -> the matching function (e.g. /api/health -> health.js)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Scheduled invoicing: the Saturday-midnight run. Its cron schedule is declared
# inside the function (netlify/functions/invoice-run.js →
# `export const config = { schedule: "0 6 * * 0" }`, Sunday early-UTC). The
# function guards to Sunday ET and is idempotent via InvoiceLog, so nothing is
# needed here.
