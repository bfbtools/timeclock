<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BFB Time Clock — Jobsite QR Codes</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Libre+Franklin:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#3b3830;--soft:#6b6459;--line:#efe0ca;--paper:#f7f0e6;--forge:#2d2e28;--ember:#db563d;--pine:#2e5e4e;--brass:#db942c;--kraft:#d6b07b;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Libre Franklin',sans-serif;background:#efe7d8;color:var(--ink);padding:24px;}
  .bar{max-width:1000px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .bar h1{font-family:'Barlow Condensed';font-weight:700;font-size:28px;letter-spacing:.5px;}
  .bar .sub{color:var(--soft);font-size:13px;margin-top:2px;}
  .tools{display:flex;gap:10px;align-items:center;}
  input{font-family:'Libre Franklin';font-size:14px;padding:9px 12px;border:1.5px solid var(--line);border-radius:8px;background:#fff;}
  button{font-family:'Libre Franklin';font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    background:var(--ember);color:#fff;border:0;border-radius:8px;padding:11px 18px;cursor:pointer;}
  .msg{max-width:1000px;margin:0 auto;color:var(--soft);font-size:14px;padding:12px 0;}
  .grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;text-align:center;break-inside:avoid;}
  .card .site{font-family:'Barlow Condensed';font-weight:700;font-size:24px;line-height:1.05;color:var(--ink);}
  .card .brand{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--kraft);text-transform:uppercase;margin-bottom:10px;}
  .card img{width:100%;max-width:260px;height:auto;margin:12px auto;display:block;}
  .card .cta{font-weight:700;font-size:13px;color:var(--pine);letter-spacing:.5px;}
  .card .cta .es{color:var(--soft);font-weight:600;}
  .card .url{font-family:'Roboto Mono',monospace;font-size:10px;color:var(--soft);word-break:break-all;margin-top:10px;}
  .card .rule{height:4px;border-radius:3px;margin:12px auto 0;max-width:200px;background:linear-gradient(90deg,var(--ember) 0 40%,var(--brass) 40% 70%,var(--pine) 70% 100%);}
  @media print{ body{background:#fff;padding:0;} .bar,.tools,.msg{display:none;} .grid{gap:0;} .card{border:0;page-break-inside:avoid;padding:40px;} }
</style>
</head>
<body>
  <div class="bar">
    <div><h1>Jobsite QR Codes</h1><div class="sub">Print one per site and post it at the jobsite. Workers scan to clock in.</div></div>
    <div class="tools">
      <input id="token" type="password" placeholder="Admin token" autocomplete="off">
      <button id="load">Load</button>
      <button id="print" style="background:var(--forge)">Print</button>
    </div>
  </div>
  <div class="msg" id="msg">Enter your admin token and press Load.</div>
  <div class="grid" id="grid"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  if (params.get('token')) $('token').value = params.get('token');

  async function load() {
    const token = $('token').value.trim();
    if (!token) { $('msg').textContent = 'Enter your admin token first.'; return; }
    $('msg').textContent = 'Loading…'; $('grid').innerHTML = '';
    try {
      const r = await fetch('/api/projects?token=' + encodeURIComponent(token));
      const data = await r.json();
      if (!data.ok) { $('msg').textContent = data.error || 'Failed to load.'; return; }
      if (!data.projects.length) { $('msg').textContent = 'No active projects with a QRParam found.'; return; }
      $('msg').textContent = data.count + ' site(s) · base ' + data.base;
      $('grid').innerHTML = data.projects.map((p) => `
        <div class="card">
          <div class="brand">Back Forty Builders</div>
          <div class="site">${p.siteName}</div>
          <img src="${p.qr}" alt="QR for ${p.siteName}">
          <div class="cta">Scan to clock in <span class="es">· Escanea para marcar</span></div>
          <div class="rule"></div>
          <div class="url">${p.url}</div>
        </div>`).join('');
    } catch (e) { $('msg').textContent = 'Error: ' + e.message; }
  }
  $('load').addEventListener('click', load);
  $('print').addEventListener('click', () => window.print());
  if (params.get('token')) load();
</script>
</body>
</html>
